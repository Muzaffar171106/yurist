name: Backend CI/CD to AWS EC2

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-aws.yml"
      - "deploy/**"
  workflow_dispatch:

concurrency:
  group: yurist-ai-backend-production
  cancel-in-progress: false

jobs:
  test:
    name: Check and test backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Static check
        run: npm run check

      - name: Tests
        run: npm test

  deploy:
    name: Deploy backend to EC2
    runs-on: ubuntu-latest
    needs: test
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          port: ${{ secrets.AWS_EC2_SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            APP_DIR="${APP_DIR:-/opt/yurist-ai}"
            REPO_URL="${REPO_URL:-https://github.com/Muzaffar171106/yurist.git}"
            BRANCH="${BRANCH:-main}"

            if [ ! -d "$APP_DIR/.git" ]; then
              sudo mkdir -p "$APP_DIR"
              sudo chown "$USER":"$USER" "$APP_DIR"
              git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"

            if [ ! -f backend/.env ]; then
              cp backend/.env.example backend/.env
            fi

            docker compose -f deploy/aws/docker-compose.prod.yml up -d --build
            docker image prune -f

            sleep 5
            curl -fsS http://127.0.0.1:5050/api/health
